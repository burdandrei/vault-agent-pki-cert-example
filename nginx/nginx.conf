# ---------------------------------------------------------------------------
# nginx.conf — example nginx configuration
#
# Certs are provisioned by Vault Agent and written to ../certs/:
#   ../certs/nginx-cert.pem   — certificate (+ intermediate chain)
#   ../certs/nginx-privkey.pem — private key
#
# Reload nginx after cert renewal:
#   bash ./reload-nginx.sh
# ---------------------------------------------------------------------------

events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------------------------------
    # HTTP — redirect all traffic to HTTPS
    # -----------------------------------------------------------------------
    server {
        listen      80;
        server_name nginx.hashicorp.ibm;

        return 301 https://$host$request_uri;
    }

    # -----------------------------------------------------------------------
    # HTTPS — TLS termination with Vault-issued certificate
    # -----------------------------------------------------------------------
    server {
        listen      443 ssl;
        server_name nginx.hashicorp.ibm;

        ssl_certificate     ../certs/nginx-cert.pem;
        ssl_certificate_key ../certs/nginx-privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
